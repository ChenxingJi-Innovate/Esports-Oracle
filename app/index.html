<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Esports Oracle — daily tier-1 predictions (CS2 + LoL)</title>
<style>
  :root{--bg:#0f1115;--card:#171a21;--line:#262b36;--ink:#e8ebf0;--mut:#9aa3b2;
    --good:#3ad29f;--warn:#f0b35b;--hot:#ff5d5d;--accent:#6ea8fe;--cs:#f0b35b;--lol:#6ea8fe;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1000px;margin:0 auto;padding:38px 22px 90px}
  h1{font-size:28px;letter-spacing:-.02em;margin:0 0 2px}
  .sub{color:var(--mut);margin:0 0 26px}
  .sub a{color:var(--accent);text-decoration:none}
  .score{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:30px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 18px;min-width:150px}
  .stat .k{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  .stat .v{font-size:24px;font-weight:650;font-variant-numeric:tabular-nums;margin-top:3px}
  h2{font-size:15px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin:30px 0 12px;display:flex;align-items:center;gap:8px}
  .dot{width:9px;height:9px;border-radius:50%}
  .cs .dot{background:var(--cs)} .lol .dot{background:var(--lol)}
  .row{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:10px}
  .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .ev{color:var(--mut);font-size:12.5px}
  .band{font-size:11px;padding:2px 9px;border-radius:999px;border:1px solid var(--line);color:var(--mut)}
  .teams{display:flex;justify-content:space-between;align-items:baseline;margin:8px 0 6px;font-size:17px;font-weight:600}
  .bar{height:12px;border-radius:7px;background:#222732;overflow:hidden;display:flex}
  .bar>span{height:100%}
  .fa{background:linear-gradient(90deg,#6ea8fe,#3ad29f)} .fb{background:#3a4150}
  .pct{display:flex;justify-content:space-between;font-size:13px;font-variant-numeric:tabular-nums;margin-top:5px}
  .pa{color:var(--good)} .pb{color:var(--mut)}
  .score-line{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap}
  .score-pick{font-size:12.5px;font-weight:600;color:var(--accent);white-space:nowrap}
  .score-dist{display:flex;gap:6px;flex-wrap:wrap}
  .scell{font-size:11.5px;color:var(--mut);background:#0f131a;border:1px solid var(--line);border-radius:7px;padding:2px 7px;font-variant-numeric:tabular-nums}
  .scell b{color:var(--ink);font-weight:600}
  .gametabs{display:flex;gap:8px;margin:22px 0 4px}
  .gtab{display:inline-flex;align-items:center;gap:7px;cursor:pointer;font:inherit;font-size:13px;
    font-weight:600;color:var(--mut);background:var(--card);border:1px solid var(--line);
    border-radius:999px;padding:8px 16px;transition:all .15s}
  .gtab:hover{color:var(--ink)}
  .gtab .dot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.5}
  .gtab.cs2.active{color:#0f1115;background:var(--cs);border-color:var(--cs)}
  .gtab.lol.active{color:#0f1115;background:var(--lol);border-color:var(--lol)}
  .gtab.val.active{color:#0f1115;background:var(--hot);border-color:var(--hot)}
  .gtab.active .dot{opacity:1}
  .daygroup{margin-bottom:18px}
  .dayhdr{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);
    margin:0 0 8px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .empty{color:var(--mut);background:var(--card);border:1px dashed var(--line);border-radius:14px;padding:18px}
  table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
  th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--line);color:var(--mut)}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  td .ok{color:var(--good)} td .no{color:var(--hot)}
  .foot{color:var(--mut);font-size:12px;margin-top:34px;line-height:1.7}
  .modelsel{display:flex;align-items:center;gap:8px;color:var(--mut);font-size:13px;margin:-12px 0 24px}
  .modelsel select{background:#0f131a;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:5px 8px;font-size:13px}
  .explain{margin-top:10px;background:transparent;border:1px solid var(--line);color:var(--accent);
    border-radius:8px;padding:6px 12px;font-size:12.5px;cursor:pointer}
  .explain:hover{border-color:var(--accent)}
  .reason{margin-top:10px;font-size:13px;color:var(--ink);background:#0f131a;border:1px solid var(--line);
    border-radius:10px;padding:0;line-height:1.6;overflow:hidden;max-height:0;transition:max-height .2s}
  .reason.open{padding:12px 14px;max-height:none}
  .reason .v{font-weight:650}.reason .adj{color:var(--warn)}.reason .src{color:var(--mut);font-size:12px;margin-top:8px}
  .sim{margin-top:10px;background:#0f131a;border:1px solid var(--line);border-radius:10px;padding:8px 12px}
  .sim summary{cursor:pointer;color:var(--accent);font-size:12.5px;list-style:none}
  .sim summary::-webkit-details-marker{display:none}
  .sim summary::before{content:"▸ ";color:var(--mut)}
  .sim[open] summary::before{content:"▾ "}
  .simtbl{margin-top:6px}.simtbl td,.simtbl th{padding:5px 6px}
  .simnote{color:var(--mut);font-size:11.5px;margin-top:4px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Esports Oracle</h1>
  <p class="sub">Daily predictions for <b>tier-1</b> CS2 · LoL · Valorant · self-grading · rolling 1-year model · auto-updates 00:00 Beijing · <a href="predict.html">Ask any matchup →</a> · <a href="explorer.html">LoL team explorer →</a> · <a href="backtest.html">Backtest →</a></p>

  <div class="score" id="score"></div>

  <div class="gametabs" id="gametabs">
    <button class="gtab cs2 active" data-game="cs2"><span class="dot"></span> CS2</button>
    <button class="gtab lol" data-game="lol"><span class="dot"></span> LoL</button>
    <button class="gtab val" data-game="val"><span class="dot"></span> Valorant</button>
  </div>

  <div class="modelsel">🔍 Explain uses:
    <select id="model">
      <option value="deepseek-v4-flash">DeepSeek V4 Flash (fast)</option>
      <option value="deepseek-v4-pro">DeepSeek V4 Pro (deep)</option>
    </select>
  </div>

  <h2 id="up-title"><span class="dot"></span> Upcoming · next 2 days</h2>
  <div id="upcoming"></div>

  <h2>Past 3 days · results</h2>
  <div id="results"></div>

  <p class="foot" id="foot"></p>
</div>

<script>
const pct = x => (x*100).toFixed(1) + "%";
function simBlock(m){
  // OE case-based reasoning: top-5 similar historical matchups as the "why".
  const sims = m.similar_matches;
  if(!sims || !sims.length){ return ''; }
  const cb = m.case_based || {};
  const rate = cb.outcome_rate ? ` · blue won ${cb.outcome_rate} of nearest`
    : '';
  const rows = sims.map(s=>`<tr>
      <td>${(s.date||'').slice(0,10)}</td>
      <td>${s.blue_team} vs ${s.red_team}</td>
      <td class="${s.winner_side==='blue'?'pa':'pb'}">${s.winner}</td>
      <td>${(s.distance).toFixed(3)}</td>
    </tr>`).join('');
  return `<details class="sim">
    <summary>Similar historical matchups${rate}</summary>
    <table class="simtbl">
      <tr><th>Date</th><th>Blue vs Red</th><th>Winner</th><th>Distance</th></tr>
      ${rows}
    </table>
    <div class="simnote">${cb.note || `Oracle's Elixir kNN (k=${cb.k||'?'}). Nearer = more similar on the 8 engineered features.`}</div>
  </details>`;
}
function scoreBlock(m){
  // Predicted scoreline (几比几): most-likely final map score + full distribution.
  const sl = m.scoreline;
  if(!sl || !sl.dist) return '';
  const bars = sl.dist.map(d=>`<span class="scell"><b>${d.score}</b> ${(d.p*100).toFixed(0)}%</span>`).join('');
  return `<div class="score-line">
    <span class="score-pick">预测比分 ${sl.pick}</span>
    <span class="score-dist">${bars}</span>
  </div>`;
}
function matchRow(m, game){
  const pa = m.p_a, pb = 1-m.p_a, aLead = pa >= pb;
  return `<div class="row">
    <div class="top"><span class="ev">${m.event} · ${m.fmt}</span><span class="band">${m.confidence}</span></div>
    <div class="teams"><span>${m.team_a}</span><span>${m.team_b}</span></div>
    <div class="bar"><span class="fa" style="width:${pct(pa)}"></span><span class="fb" style="width:${pct(pb)}"></span></div>
    <div class="pct"><span class="${aLead?'pa':'pb'}">${pct(pa)} ${aLead?'◄ pick':''}</span>
      <span class="${!aLead?'pa':'pb'}">${!aLead?'pick ►':''} ${pct(pb)}</span></div>
    ${scoreBlock(m)}
    <button class="explain" onclick="explain('${game}','${m.match_id}',this)">🔍 Explain</button>
    ${simBlock(m)}
    <div class="reason" id="r-${m.match_id}"></div>
  </div>`;
}

async function explain(game, matchId, btn){
  const box = document.getElementById('r-'+matchId);
  const m = (window.PRED?.slate?.[game]||[]).find(x=>x.match_id===matchId);
  if(!m){return;}
  const model = document.getElementById('model').value;
  box.classList.add('open'); box.innerHTML = 'Thinking with '+model.replace('deepseek-','')+'…';
  btn.disabled = true;
  try{
    const r = await fetch('/api/explain', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model, match:{...m, game}})});
    const d = await r.json();
    if(d.error){ box.innerHTML = '⚠️ '+d.error+' (is DEEPSEEK_API_KEY set on Vercel?)'; btn.disabled=false; return; }
    const adj = d.adjusted_p_a!=null ? `<div class="adj">↳ adjusted ${m.team_a} → ${pct(d.adjusted_p_a)}</div>`:'';
    const src = (d.searched&&d.searched.length)?`<div class="src">searched: ${d.searched.map(s=>s.query).filter(Boolean).join('; ')||'—'}</div>`:'';
    box.innerHTML = `<span class="v">${(d.verdict||'').toUpperCase()}</span> · conf ${d.confidence||'?'} · ${model.replace('deepseek-','')}
      <div style="margin-top:6px">${d.reasoning||''}</div>${adj}${src}`;
  }catch(e){ box.innerHTML = '⚠️ '+e.message; }
  btn.disabled = false;
}
const statCard = (k,v) => `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`;

const GAME_LABEL = {cs2:'CS2', lol:'LoL', val:'Valorant'};
const EMPTY = {
  cs2:'No tier-1 CS2 matches in the next 2 days.',
  lol:'No tier-1 LoL (LPL/LCK/LEC/MSI/Worlds) matches in the next 2 days.',
  val:'No tier-1 Valorant (VCT) matches in the next 2 days — corpus + schedule populate on the daily cron.'
};
const fmtDay = iso => {
  if(!iso) return 'Date TBD';
  const t = new Date(iso+'T00:00:00Z'), today = new Date();
  const d0 = Date.UTC(today.getUTCFullYear(),today.getUTCMonth(),today.getUTCDate());
  const diff = Math.round((Date.UTC(t.getUTCFullYear(),t.getUTCMonth(),t.getUTCDate())-d0)/864e5);
  const lbl = diff===0?'Today':diff===1?'Tomorrow':diff===-1?'Yesterday':null;
  const ds = t.toLocaleDateString(undefined,{month:'short',day:'numeric',weekday:'short',timeZone:'UTC'});
  return lbl ? `${lbl} · ${ds}` : ds;
};

function renderUpcoming(game){
  const slate = (window.PRED.slate?.[game])||[];
  const box = document.getElementById('upcoming');
  if(!slate.length){ box.innerHTML = `<div class="empty">${EMPTY[game]}</div>`; return; }
  // group by date, ascending
  const byDate = {};
  slate.forEach(m=>{ (byDate[m.date||'']=byDate[m.date||'']||[]).push(m); });
  box.innerHTML = Object.keys(byDate).sort().map(d=>`
    <div class="daygroup"><div class="dayhdr">${fmtDay(d)}</div>
      ${byDate[d].map(m=>matchRow(m,game)).join("")}</div>`).join("");
}

function renderResults(game){
  const rows = (window.PRED.results?.[game])||[];
  const box = document.getElementById('results');
  if(!rows.length){ box.innerHTML = `<div class="empty">No graded ${GAME_LABEL[game]} results in the past 3 days yet.</div>`; return; }
  box.innerHTML = `<table>
    <tr><th>Date</th><th>Match</th><th>Pick</th><th>Conf</th><th>Result</th></tr>
    ${rows.map(p=>`<tr>
      <td>${p.date}</td>
      <td>${p.team_a} vs ${p.team_b}</td>
      <td>${p.pick} (${pct(p.result==='a'?p.p_a:1-p.p_a)} for winner)</td>
      <td>${p.confidence}</td>
      <td>${p.correct?'<span class="ok">✓ hit</span>':'<span class="no">✗ miss</span>'}</td>
    </tr>`).join("")}</table>`;
}

function selectGame(game){
  window.GAME = game;
  document.querySelectorAll('.gtab').forEach(b=>b.classList.toggle('active', b.dataset.game===game));
  document.getElementById('up-title').innerHTML = `<span class="dot"></span> ${GAME_LABEL[game]} · upcoming · next 2 days`;
  renderUpcoming(game);
  renderResults(game);
}

(async () => {
  let pred;
  try {
    pred = await (await fetch("data/predictions.json?_="+Date.now())).json();
  } catch(e){
    document.getElementById("upcoming").innerHTML = `<div class="empty">No published data yet (or opened via file://, which blocks fetch). Serve it: <code>python3 -m http.server --directory app</code>, or wait for the daily cron.</div>`;
    return;
  }
  window.PRED = pred;
  const acc = pred.accuracy.overall, byg = pred.accuracy.by_game||{};
  document.getElementById("score").innerHTML =
    statCard("Slate date", pred.generated_for) +
    statCard("Overall acc", acc.accuracy!=null ? pct(acc.accuracy) : "—") +
    statCard("Graded picks", acc.graded||0) +
    statCard("CS2 acc", byg.cs2&&byg.cs2.accuracy!=null ? pct(byg.cs2.accuracy) : "—") +
    statCard("LoL acc", byg.lol&&byg.lol.accuracy!=null ? pct(byg.lol.accuracy) : "—") +
    statCard("Val acc", byg.val&&byg.val.accuracy!=null ? pct(byg.val.accuracy) : "—");

  document.querySelectorAll('.gtab').forEach(b=>b.onclick=()=>selectGame(b.dataset.game));
  selectGame('cs2');

  document.getElementById("foot").innerHTML =
    (pred.notes||[]).join(" · ") +
    `<br/>Backbone verified on LoL (Oracle's Elixir) at ~69% kNN out-of-sample. CS2/Valorant case bases are smaller and provisional. Data: Liquipedia (CC BY-SA).`;
})();
</script>
</body>
</html>
