name: daily-predictions

# Runs every day at 00:00 Beijing (UTC+8) = 16:00 UTC. Fetches the new day's
# tier-1 schedule from Liquipedia, grades the matches that finished, retrains the
# models on those fresh results, and publishes today's CS2 / LoL / Valorant slate
# (plus past-3-days results), committing the JSON so Vercel redeploys the site.
on:
  schedule:
    - cron: "0 16 * * *"   # 16:00 UTC == 00:00 Asia/Shanghai (no DST)
  workflow_dispatch: {}    # manual "Run workflow" button

permissions:
  contents: write          # allow the bot to commit data + grown corpora

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install numpy pandas

      # Grow the CS2 + Valorant case-base corpora from Liquipedia. Cached on
      # disk, rate-limited, best-effort: a slow/unreachable source never fails
      # the run, and finished runs only fetch newly-completed events.
      - name: Refresh case-base corpora (best-effort)
        continue-on-error: true
        run: |
          python -m pipeline.cs2_corpus || echo "cs2 corpus refresh skipped"
          python -m pipeline.val_corpus || echo "val corpus refresh skipped"

      # Fetch today's schedule (also done inside daily.py as a safety net),
      # grade finished matches, retrain on results, predict + publish.
      - name: Predict + grade + retrain + publish
        run: python -m pipeline.daily

      - name: Commit updated data
        run: |
          git config user.name  "oracle-bot"
          git config user.email "actions@users.noreply.github.com"
          git add app/data/*.json data/*.json data/processed/*.csv
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "daily: $(date -u +%F) schedule + grades + retrain"
            git push
          fi
